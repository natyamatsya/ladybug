name: Build and Deploy

# Release/publish pipeline, kept for future releases. The Java and Node.js
# release jobs (build-java/deploy-java/build-nodejs/deploy-nodejs) and the
# GCC-13 linux builder image that served them were removed along with those
# bindings; remaining targets: python wheels, the Rust crate, WASM, the
# extension, and precompiled binaries. Restore the bindings' jobs from git
# history if those language packages are ever reintroduced.
on:
  # Nightly schedule disabled to save CI budget; re-enable when budget allows.
  # schedule:
  #   - cron: "0 11 * * *"

  workflow_dispatch:
    inputs:
      isDeploy:
        description: "Whether the build should be deployed?"
        type: boolean
        required: true
        default: false
      skipBinaries:
        description: "Skip building precompiled binaries?"
        type: boolean
        required: true
        default: false
      skipWasm:
        description: "Skip building WebAssembly?"
        type: boolean
        required: true
        default: false
      skipPython:
        description: "Skip building Python?"
        type: boolean
        required: true
        default: false
      skipRust:
        description: "Skip building Rust?"
        type: boolean
        required: true
        default: false
      skipExtensions:
        description: "Skip building extensions?"
        type: boolean
        required: true
        default: true
      isNightly:
        description: "Whether the build is a nightly build?"
        type: boolean
        required: true
        default: false
env:
  PIP_BREAK_SYSTEM_PACKAGES: 1

permissions:
  id-token: write  # Required for OIDC
  contents: read
  packages: write  # Required by extension deployment

jobs:
  get-nightly-version:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.isNightly == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        run: python3 -m pip install uv

      - name: Update nightly version
        run: |
          uv venv
          source .venv/bin/activate
          python3 update-nightly-build-version.py | grep "New Python dev version:" | awk -F'New Python dev version: ' '{print $2}' | sed 's/\.$//' > version.txt
          cat version.txt
        working-directory: scripts
      
      - name: Upload version
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: version
          path: scripts/version.txt

  build-extension:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipExtensions != 'true' }}
    uses: ./.github/workflows/build-and-deploy-extension.yml
    with:
      isNightly: ${{ github.event_name == 'schedule' || github.event.inputs.isNightly == 'true' }}
    secrets: inherit

  build-wheels:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipPython != 'true' }}
    needs: [build-precompiled-bin]
    uses: ./.github/workflows/python-wheel-workflow.yml
    with:
      isNightly: ${{ github.event_name == 'schedule' || github.event.inputs.isNightly == 'true' }}
      precompiledRunId: ${{ github.run_id }}
    secrets: inherit

  deploy-python:
    permissions:
      id-token: write
    environment:
      name: pypi
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipPython != 'true' }}
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-wheels-arm64
          path: dist

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-wheels-x86_64
          path: dist

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: manylinux_2_28-wheels-x86_64
          path: dist

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: manylinux_2_28-wheels-aarch64
          path: dist

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-wheels-amd64
          path: dist

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-wheels-arm64
          path: dist

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-sdist
          path: dist

      - name: List wheels
        run: ls -l
        working-directory: dist

      - name: Clean up existing attestation files
        run: rm -f *.publish.attestation
        working-directory: dist

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lbug-deploy-wheels
          path: dist/*

      - name: Deploy to PyPI test
        if: ${{ github.event_name != 'workflow_dispatch' && github.event.inputs.isDeploy != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Clean up TestPyPI attestation files
        if: ${{ github.event_name != 'workflow_dispatch' && github.event.inputs.isDeploy != 'true' }}
        run: rm -f *.publish.attestation
        working-directory: dist

      - name: Deploy to PyPI
        if: ${{ github.event_name == 'schedule' || github.event.inputs.isDeploy == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
  
  deploy-rust:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipRust != 'true' }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      LBUG_SOURCE_DIR: ${{ github.workspace }}
      LBUG_RUST_BUILD_FROM_SOURCE: 1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update submodules
        run: git submodule update --init --recursive tools/rust_api

      - name: Create lbug-src symlink
        run: ln -s $(pwd) tools/rust_api/lbug-src

      - name: Install uv
        run: pip3 install uv

      - name: Update nightly version
        if: ${{ github.event_name == 'schedule' || github.event.inputs.isNightly == 'true' }}
        run: |
          uv venv
          source .venv/bin/activate
          python3 update-nightly-build-version.py
        working-directory: scripts

      - name: Update Cargo.toml version
        run: python3 update_version.py
        working-directory: tools/rust_api

      - name: Deploy crate to Crates.io
        run: cargo publish --allow-dirty
        if: ${{ github.event.inputs.isDeploy == 'true' }}
        working-directory: tools/rust_api

      - name: Test publishing crate
        run: cargo publish --dry-run --allow-dirty
        if: ${{ github.event.inputs.isDeploy != 'true' }}
        working-directory: tools/rust_api

      - name: Upload crate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lbug-deploy-crate
          path: tools/rust_api/target/package/*.crate

  build-and-test-wasm:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipWasm != 'true' }}
    uses: ./.github/workflows/wasm-workflow.yml
    with:
      isNightly: ${{ github.event_name == 'schedule' || github.event.inputs.isNightly == 'true' }}
    secrets: inherit
  
  deploy-wasm:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipWasm != 'true' }}
    needs: [build-and-test-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update submodules
        run: git submodule update --init --recursive tools/wasm

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lbug-deploy-wasm
          path: tools/wasm

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Show tarball contents
        run: tar -tvf lbug-wasm.tar.gz
        working-directory: tools/wasm

      - name: Deploy to npm.js dry run
        if: ${{ github.event_name != 'schedule' && github.event.inputs.isDeploy != 'true' }}
        run: |
          TAG=latest
          if [ "${{ github.event.inputs.isNightly }}" = "true" ]; then
            TAG=next
          fi
          npm publish lbug-wasm.tar.gz --access public --tag "${TAG}" --dry-run
        working-directory: tools/wasm

      - name: Deploy nightly to npm.js
        if: ${{ github.event_name == 'schedule' || (github.event.inputs.isDeploy == 'true' && github.event.inputs.isNightly == 'true') }}
        run: |
          NIGHTLY_TAG="nightly-$(date -u +%Y%m%d)"
          PACKAGE_NAME="$(tar -xOf lbug-wasm.tar.gz package/package.json | node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(pkg.name)")"
          PACKAGE_VERSION="$(tar -xOf lbug-wasm.tar.gz package/package.json | node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(pkg.version)")"
          PACKAGE_REF="${PACKAGE_NAME}@${PACKAGE_VERSION}"
          echo "Nightly tag: ${NIGHTLY_TAG}"
          echo "Package ref: ${PACKAGE_REF}"

          if npm view "${PACKAGE_REF}" version >/dev/null 2>&1; then
            echo "Package version already exists on npm; trusted publishing only supports publish, so skipping dist-tag update."
          else
            npm publish lbug-wasm.tar.gz --provenance --access public --tag "${NIGHTLY_TAG}"
          fi
        working-directory: tools/wasm

      - name: Deploy to npm.js
        if: ${{ github.event.inputs.isDeploy == 'true' && github.event.inputs.isNightly != 'true' }}
        run: npm publish lbug-wasm.tar.gz --provenance --access public --tag latest
        working-directory: tools/wasm

  build-precompiled-bin:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skipBinaries != 'true' }}
    uses: ./.github/workflows/precompiled-bin-workflow.yml
    with:
      isNightly: ${{ github.event_name == 'schedule' || github.event.inputs.isNightly == 'true' }}
    secrets: inherit

